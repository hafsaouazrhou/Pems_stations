[supervisord]
nodaemon=true
logfile=/var/log/supervisor/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/var/log/supervisor

; ── MongoDB ───────────────────────────────────────────────────────────────────
[program:mongod]
command=/usr/bin/mongod --bind_ip 0.0.0.0 --dbpath /data/db
autostart=true
autorestart=true
startsecs=3
priority=10
stdout_logfile=/var/log/supervisor/mongod-stdout.log
stderr_logfile=/var/log/supervisor/mongod-stderr.log

; ── Flask app ─────────────────────────────────────────────────────────────────
[program:flask]
command=/venv/bin/python /app/app.py
directory=/app
environment=MONGO_URI="mongodb://127.0.0.1:27017/"
autostart=true
autorestart=true
startsecs=5
priority=20
stdout_logfile=/var/log/supervisor/flask-stdout.log
stderr_logfile=/var/log/supervisor/flask-stderr.log
